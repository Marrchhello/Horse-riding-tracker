services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: horse-riding-backend
    ports:
      - "3000:3000"
    volumes:
      # Mount the data directory to persist the database between container restarts
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000/api
    container_name: horse-riding-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
